name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: windows-build
          - os: macos-latest
            target: macos
            artifact_name: macos-build
          - os: ubuntu-latest
            target: linux
            artifact_name: linux-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          pyinstaller --windowed --onefile --name "app" main.py
          mv dist/app.exe dist/app-windows.exe

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          pyinstaller --windowed --onedir --name "app" main.py
          cd dist
          zip -r app-macos.zip app.app

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          pyinstaller --windowed --onefile --name "app" main.py
          mv dist/app dist/app-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/app-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}